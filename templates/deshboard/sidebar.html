{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/dashboard/sidebar.css' %}">
{% endblock %}

    <div class="col-md-3">
        <div class="card shadow-sm border-0 rounded-3">
            <!-- Sidebar Menu -->
            <div class="list-group list-group-flush">

                <a href="{% url 'deshboard' %}"
                    class="list-group-item list-group-item-action
                    {% if '/deshboard/' == request.path %}sidebar-active{% endif %}">
                    Deshboard
                </a>
                <a href="{% url 'users' %}" 
                class="list-group-item list-group-item-action
                {% if '/users/' in request.path %}sidebar-active{% endif %}">
                    Users
                </a>
                <a href="{% url 'categories' %}"
                    class="list-group-item list-group-item-action
                    {% if '/categories/' in request.path %}sidebar-active{% endif %}">
                    Categories
                </a>
                <a href="{% url 'posts' %}" 
                    class="list-group-item list-group-item-action
                    {% if '/posts/' in request.path %}sidebar-active{% endif %}">
                    Posts
                </a>            
                <a href="#" class="list-group-item list-group-item-action">
                    ⚙️ Settings
                </a>

            </div>

            <!-- Logout -->
            <div class="card-footer bg-white">
                <a href="{% url 'logout' %}" class="btn btn-outline-danger w-100">
                    Logout
                </a>
            </div>

        </div>
    </div>
